<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0a7b3e,#13b35d);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
text-align:center;
}

h1{
color:#0a7b3e;
margin-bottom:15px;
}

p{
margin-bottom:20px;
color:#555;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0a7b3e;
color:#fff;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#06662f;
}

#wheelSection{
display:none;
margin-top:20px;
}

#wheel{
width:320px;
height:320px;
border-radius:50%;
margin:auto;
background:#eee;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
color:#333;
border:10px solid #0a7b3e;
}

#result{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#0a7b3e;
}
</style>

</head>

<body>

<div class="container">

<h1>Conference Spin & Win</h1>

<p>Fill your details to continue</p>

<div id="formSection">

<input type="text" id="name" placeholder="Doctor Name">

<input type="text" id="hospital" placeholder="Hospital">

<input type="tel" id="mobile" placeholder="Mobile Number">

<button onclick="startGame()">
Continue
</button>

</div>

<div id="wheelSection">

<div id="wheel">
Spin Wheel
</div>

<button id="spinBtn">
SPIN NOW
</button>

<div id="result"></div>

</div>

<script>
