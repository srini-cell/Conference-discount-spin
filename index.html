  <script>

function startConfetti(){

    const canvas =
    document.getElementById("confetti");

    const ctx =
    canvas.getContext("2d");


    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;


    let pieces=[];


    for(let i=0;i<120;i++){

        pieces.push({

            x:Math.random()*canvas.width,

            y:Math.random()*canvas.height- canvas.height,

            size:Math.random()*8+4,

            speed:Math.random()*3+2,

            angle:Math.random()*360

        });

    }


    function animate(){

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );


        pieces.forEach(p=>{

            p.y += p.speed;

            p.angle += 5;


            ctx.save();

            ctx.translate(
                p.x,
                p.y
            );

            ctx.rotate(
                p.angle*Math.PI/180
            );


            ctx.fillStyle =
            "hsl("+
            Math.random()*360+
            ",80%,50%)";


            ctx.fillRect(
                0,
                0,
                p.size,
                p.size
            );


            ctx.restore();


            if(p.y > canvas.height){

                p.y = -10;

            }


        });


        requestAnimationFrame(animate);

    }


    animate();


    setTimeout(()=>{

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

    },5000);


}



function openWheel(){

    document.getElementById("formPage").style.display="none";

    document.getElementById("wheelPage").style.display="block";

}</script>
